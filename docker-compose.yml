services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - cache_data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  cache_data:
